name: Build ESP-IDF Firmware

on:
  push:
    paths:
      - 'main/**'
      - 'components/**'
      - 'code/web_src/**'
      - 'tools/**'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults'
      - 'partitions_ota_1m6.csv'
      - '.github/workflows/build.yml'
      - '.github/release-notes/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # 发布 Release 需要

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify generated web assets
        run: python tools/build_web_assets.py --check

      - name: Read firmware version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP 'IDF_FW_VERSION = "\K[0-9A-Za-z.\-]+' components/idf_config/include/idf_config.h)
          test -n "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "固件版本: $VERSION"

      - name: Build firmware
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          idf.py -B build/idf -D SDKCONFIG=build/sdkconfig build

      - name: Package release binaries
        shell: bash
        run: |
          . "$IDF_PATH/export.sh"
          V=${{ steps.version.outputs.version }}
          mkdir -p dist
          # OTA 升级包：网页"固件升级"直接上传这个（仅 app 分区镜像）
          cp build/idf/sms_forwarding_idf.bin "dist/sms_forwarder_ota_v${V}.bin"
          # 整机烧录包：bootloader+分区表+app 合并为单文件，esptool 从 0x0 烧录即可
          esptool.py --chip esp32c3 merge_bin -o "dist/sms_forwarder_full_v${V}.bin" \
            0x0 build/idf/bootloader/bootloader.bin \
            0x8000 build/idf/partition_table/partition-table.bin \
            0xe000 build/idf/ota_data_initial.bin \
            0x10000 build/idf/sms_forwarding_idf.bin
          ls -l dist/

      - name: Compute release checksums
        id: checksums
        shell: bash
        run: |
          V=${{ steps.version.outputs.version }}
          OTA_FILE="dist/sms_forwarder_ota_v${V}.bin"
          FULL_FILE="dist/sms_forwarder_full_v${V}.bin"
          echo "ota_sha256=$(sha256sum "$OTA_FILE" | awk '{print toupper($1)}')" >> "$GITHUB_OUTPUT"
          echo "full_sha256=$(sha256sum "$FULL_FILE" | awk '{print toupper($1)}')" >> "$GITHUB_OUTPUT"

      - name: Generate release changelog
        id: changelog
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          V=${{ steps.version.outputs.version }}
          CURRENT_TAG="v${V}"
          PREVIOUS_TAG=""
          RELEASE_NOTES_FILE=".github/release-notes/v${V}.md"

          REMOTE_TAGS=$(python -c 'import json, os, re, urllib.request; token=os.environ.get("GH_TOKEN", ""); headers={"Accept": "application/vnd.github+json", "User-Agent": "sms-forwarding-release"}; headers.update({"Authorization": "Bearer " + token} if token else {}); req=urllib.request.Request("https://api.github.com/repos/%s/git/matching-refs/tags/v" % os.environ["GITHUB_REPOSITORY"], headers=headers); refs=json.load(urllib.request.urlopen(req, timeout=20)); tags=[item["ref"].rsplit("/", 1)[-1] for item in refs]; tags.sort(key=lambda tag: tuple((0, int(part)) if part.isdigit() else (1, part) for part in re.findall("[0-9]+|[A-Za-z]+", tag)), reverse=True); print("\n".join(tags))' 2>/tmp/release-remote-tags.err)
          if [ -n "$REMOTE_TAGS" ]; then
            echo "远程 tags:"
            printf '%s\n' "$REMOTE_TAGS"
            PREVIOUS_TAG=$(printf '%s\n' "$REMOTE_TAGS" | grep -vx "$CURRENT_TAG" | head -n 1 || true)
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "远程 tags 识别上一版本: $PREVIOUS_TAG"
            fi
          else
            echo "远程 tags 为空或读取失败。"
            if [ -s /tmp/release-remote-tags.err ]; then
              cat /tmp/release-remote-tags.err
            fi
          fi

          if [ -z "$PREVIOUS_TAG" ]; then
            LOCAL_TAGS=$(git tag --list 'v*' --sort=-v:refname)
            if [ -n "$LOCAL_TAGS" ]; then
              echo "改用本地 tags:"
              printf '%s\n' "$LOCAL_TAGS"
              PREVIOUS_TAG=$(printf '%s\n' "$LOCAL_TAGS" | grep -vx "$CURRENT_TAG" | head -n 1 || true)
              if [ -n "$PREVIOUS_TAG" ]; then
                echo "本地 tags 识别上一版本: $PREVIOUS_TAG"
              fi
            else
              echo "本地 tags 为空。"
            fi
          fi

          if [ -n "$PREVIOUS_TAG" ]; then
            git fetch --force origin "refs/tags/${PREVIOUS_TAG}:refs/tags/${PREVIOUS_TAG}" || true
          fi

          {
            echo 'notes<<EOF'
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "对比范围：\`${PREVIOUS_TAG}..${GITHUB_SHA}\`"
              echo
              if [ -f "$RELEASE_NOTES_FILE" ]; then
                cat "$RELEASE_NOTES_FILE"
              else
                export PREVIOUS_TAG
                COMPARE_NOTES=$(python -c 'import json, os, urllib.parse, urllib.request; token=os.environ.get("GH_TOKEN", ""); headers={"Accept": "application/vnd.github+json", "User-Agent": "sms-forwarding-release"}; headers.update({"Authorization": "Bearer " + token} if token else {}); base=urllib.parse.quote(os.environ["PREVIOUS_TAG"], safe=""); head=os.environ["GITHUB_SHA"]; req=urllib.request.Request("https://api.github.com/repos/%s/compare/%s...%s" % (os.environ["GITHUB_REPOSITORY"], base, head), headers=headers); data=json.load(urllib.request.urlopen(req, timeout=20)); commits=[item for item in data.get("commits", []) if len(item.get("parents", [])) <= 1]; print("\n".join("- %s (`%s`)" % (item["commit"]["message"].splitlines()[0], item["sha"][:7]) for item in commits))' 2>/tmp/release-compare.err)
                if [ -n "$COMPARE_NOTES" ]; then
                  printf '%s\n' "$COMPARE_NOTES"
                else
                  if [ -s /tmp/release-compare.err ]; then
                    cat /tmp/release-compare.err
                  fi
                  git log --no-merges --pretty=format:'- %s (`%h`)' "${PREVIOUS_TAG}..${GITHUB_SHA}" || true
                fi
              fi
            else
              echo "首次发布或未找到上一版本 tag。"
              echo
              git log --no-merges --pretty=format:'- %s (`%h`)' -n 20 || true
            fi
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload firmware artifact (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: esp-idf-firmware-bin
          path: |
            dist/*.bin
            build/idf/sms_forwarding_idf.bin
            build/idf/bootloader/bootloader.bin
            build/idf/partition_table/partition-table.bin
          retention-days: 7

      # 推送到 master 或手动触发 master 构建时发布/更新 Release：tag 为 v<版本号>，附可直接下载的固件。
      # Release 说明需包含 OTA 包、整机烧录包和可直接复制的烧录命令。
      # 同版本再次推送会更新既有 Release 的附件（覆盖同名文件），不会重复建 Release。
      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 固件 v${{ steps.version.outputs.version }}
          files: dist/*.bin
          body: |
            SMS Forwarder ESP-IDF 固件 **v${{ steps.version.outputs.version }}**（构建自 `${{ github.sha }}`）

            ## 更新内容

            ${{ steps.changelog.outputs.notes }}

            | 文件 | 用途 |
            | --- | --- |
            | `sms_forwarder_full_v${{ steps.version.outputs.version }}.bin` | 首次刷机、救砖、分区变化后重刷；从地址 `0x0` 整机刷写 |
            | `sms_forwarder_ota_v${{ steps.version.outputs.version }}.bin` | 设备网页「固件升级」页直接上传（OTA，无需数据线） |

            普通用户不需要下载源码，也不需要安装 Python/ESP-IDF。首次刷机推荐使用乐鑫官方 GUI 工具：

            - Windows：[Flash Download Tool](https://docs.espressif.com/projects/esp-test-tools/en/latest/esp32c3/production_stage/tools/flash_download_tool.html)，选择 `ESP32-C3`，把 `sms_forwarder_full_v${{ steps.version.outputs.version }}.bin` 填到地址 `0x0`，选择实际串口和 `460800` 波特率后开始刷写。
            - Chrome / Edge：[ESP Launchpad](https://espressif.github.io/esp-launchpad/) 自定义固件刷写，选择 `sms_forwarder_full_v${{ steps.version.outputs.version }}.bin`，地址填 `0x0`。

            已经安装 Python/esptool 的高级用户，也可以用命令行刷完整包（按实际串口号替换 `COM5`）：

            ```powershell
            esptool.py --chip esp32c3 -p COM5 -b 460800 --before default_reset --after hard_reset write_flash --flash_mode dio --flash_freq 80m --flash_size 4MB 0x0 sms_forwarder_full_v${{ steps.version.outputs.version }}.bin
            ```

            OTA 升级：打开设备网页的「固件升级」页，上传 `sms_forwarder_ota_v${{ steps.version.outputs.version }}.bin`。不要把 `full` 包上传到网页 OTA，也不要把 `ota` 包从 `0x0` 当整机镜像刷写。

            SHA-256：

            | 文件 | SHA-256 |
            | --- | --- |
            | `sms_forwarder_ota_v${{ steps.version.outputs.version }}.bin` | `${{ steps.checksums.outputs.ota_sha256 }}` |
            | `sms_forwarder_full_v${{ steps.version.outputs.version }}.bin` | `${{ steps.checksums.outputs.full_sha256 }}` |
