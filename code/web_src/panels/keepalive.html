<div class="panel" id="panel-keepalive">
      <div class="page-head">
        <div>
          <h1 class="page-title">定时任务</h1>
          <p class="page-subtitle">保号、自定义任务与系统定时统一为任务卡片；每个任务可选目标 eSIM 卡 / 动作 / 周期</p>
        </div>
        <button type="button" class="btn btn-secondary page-action" id="stAddBtn" onclick="stAddTask()">+ 添加任务</button>
      </div>
      <div class="sched-list">
        <div class="sched-task-grid">
          <!-- 保号任务（置顶固定卡） -->
          <form action="/save" method="POST" id="kaForm" class="sched-save-block">
          <div class="push-channel st-task ka-card" id="kaCard">
            <div class="push-channel-header">
              <label class="switch-inline"><input type="checkbox" class="switch-input" name="kaEnabled" id="kaEnabled" onchange="kaSyncHead()"><span class="switch-slider"></span></label>
              <label for="kaEnabled" class="label-inline">SIM 保号</label>
              <span class="ch-summary">保号任务 · 固定不可删</span>
              <span class="schedule-tag" id="kaCountdown" style="margin-left:auto;">--</span>
            </div>
            <div class="push-channel-body">
              <input type="hidden" name="kaProfile" id="kaProfile">
              <div class="form-row">
                <div class="form-group"><label>周期（天）</label><input type="number" id="kaIntervalDays" name="kaIntervalDays" min="1" max="3650" value="175"></div>
                <div class="form-group"><label>动作</label>
                  <select id="kaAction" name="kaAction">
                    <option value="1">蜂窝 HTTP 下载 payload</option>
                    <option value="2">发送短信</option>
                    <option value="3">USSD 查询</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>目标 eSIM 卡（可选）</label>
                  <select id="kaProfileSel" onchange="profSelChange('kaProfile')"></select>
                  <input type="text" id="kaProfileCustom" maxlength="64" placeholder="手动输入 ICCID 或别名" style="display:none;margin-top:8px;" oninput="profSelChange('kaProfile')">
                </div>
                <div class="form-group"><label>目标（短信号码 / USSD 码；HTTP 留空）</label><input type="text" id="kaTarget" name="kaTarget" placeholder="如 10086 或 *122#"></div>
              </div>
              <div class="form-group"><label>保号 URL（HTTP 下载 payload）</label><input type="url" id="kaUrl" name="kaUrl" placeholder="http://gg.incrafttime.top/api/payload?size=64342"></div>
              <div class="st-task-foot">
                <span class="form-hint" style="margin:0;">周期建议小于运营商要求（giffgaff 180 天设 175）；指定卡时保号前自动切换、完成后切回原卡</span>
                <span class="btn-row"><button type="button" class="btn btn-secondary btn-sm" onclick="kaRun()">立即执行</button><button type="button" class="btn btn-secondary btn-sm" onclick="kaReset()">重置基准日</button></span>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-save">保存 SIM 保号</button>
          </form>

          <!-- 自定义定时任务（JS 动态构建，最多 ST_MAX 张） -->
          <form action="/save" method="POST" id="stForm" class="sched-save-block">
            <div id="stTasks"></div>
            <button type="submit" class="btn btn-primary btn-block btn-save">保存自定义任务</button>
          </form>
        </div>

        <p class="form-hint" id="stEmptyHint" style="margin:4px 2px 6px;">点右上角“+ 添加任务”创建自定义任务：可指定目标 eSIM 卡，执行前切换、完成后切回原卡，失败次日自动重试。</p>

        <!-- 系统定时（每天固定小时执行） -->
        <form action="/save" method="POST" id="systemSchedForm" class="sched-save-block">
        <input type="hidden" name="systemSchedForm" value="1">
        <div class="push-channel sys-card">
          <div class="push-channel-header"><label class="label-inline">系统定时</label><span class="ch-summary">重启 / 心跳 · 每天固定小时</span></div>
          <div class="push-channel-body">
            <div class="form-row">
              <div class="form-group"><label class="switch-inline" style="margin-bottom:6px;"><input type="checkbox" class="switch-input" name="rebootEnabled" %RB_CHECKED%><span class="switch-slider"></span><span>每日定时重启</span></label><input class="form-input" type="number" name="rebootHour" value="%RB_HOUR%" min="0" max="23"></div>
              <div class="form-group"><label class="switch-inline" style="margin-bottom:6px;"><input type="checkbox" class="switch-input" name="hbEnabled" %HB_CHECKED%><span class="switch-slider"></span><span>每日心跳通知（启用的推送/邮件）</span></label><input class="form-input" type="number" name="hbHour" value="%HB_HOUR%" min="0" max="23"></div>
            </div>
            <p class="form-hint" style="margin:0;">小时按本地时间 0-23 执行；定时重启建议放在空闲时段</p>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-save">保存系统定时</button>
        </form>
      </div>
    </div>

    <!-- ===== Diagnostics & Control ===== -->
