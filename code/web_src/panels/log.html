<div class="panel" id="panel-log">
      <h1 class="page-title">系统日志</h1>
      <p class="page-subtitle">实时查看设备运行日志</p>
      <div class="card">
        <div class="card-header">日志输出</div>
        <div class="card-body">
          <div id="logView">加载中...</div>
          <div class="log-toolbar">
            <button class="btn btn-secondary btn-sm" onclick="clearLogUI()">清空显示</button>
            <button class="btn btn-secondary btn-sm" onclick="reloadLog()">重新加载</button>
            <button class="btn btn-secondary btn-sm" onclick="copyLogAll(this)">复制全部</button>
            <button class="btn btn-secondary btn-sm" onclick="location.href='/logdownload'">下载日志</button>
            <label class="log-auto"><input type="checkbox" id="logAuto" checked onchange="toggleLogAuto()"> 自动刷新</label>
          </div>
          <div class="log-status" id="logStatus"></div>
          <p class="form-hint">设备在内存中保留最近 120 条日志（重启清空），本页打开期间会持续累积新日志。</p>
        </div>
      </div>
    </div>
